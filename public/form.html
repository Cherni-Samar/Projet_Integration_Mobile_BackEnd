<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Team Recruitment Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --lime: #CCFF00;
  --dark: #0A0A0A;
  --grey: #1A1A1A;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body {
  background: var(--dark);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.form-container {
  background: var(--grey);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  max-width: 450px;
  width: 100%;
  border: 1px solid rgba(204, 255, 0, 0.1);
}
.logo { color: var(--lime); font-weight: 800; font-size: 24px; margin-bottom: 10px; text-align: center; }
h2 { margin-bottom: 25px; color: white; font-size: 20px; text-align: center; font-weight: 600; }
.form-group { margin-bottom: 20px; }
label {
  display: block;
  margin-bottom: 8px;
  color: #888;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
input, select, textarea {
  width: 100%;
  padding: 12px 16px;
  background: #252525;
  border: 1px solid #333;
  border-radius: 12px;
  font-size: 14px;
  color: white;
  transition: all 0.3s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--lime);
  background: #2a2a2a;
}
textarea { resize: none; height: 100px; }
button {
  width: 100%;
  padding: 15px;
  background: var(--lime);
  color: black;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 10px;
  transition: transform 0.2s;
}
button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(204, 255, 0, 0.3); }
button:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
.message {
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  text-align: center;
}
.message.success { background: rgba(204, 255, 0, 0.1); color: var(--lime); border: 1px solid var(--lime); }
.message.error { background: rgba(255, 0, 0, 0.1); color: #ff4444; border: 1px solid #ff4444; }
.ai-badge {
  display: inline-block;
  background: rgba(204, 255, 0, 0.1);
  color: var(--lime);
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 6px;
  margin-bottom: 15px;
  font-weight: 800;
}
</style>
</head>
<body>
<div class="form-container">
  <div class="logo">🚀 E-TEAM</div>
  <div style="text-align: center;"><span class="ai-badge">ANALYSE PAR HERA IA</span></div>
  <h2>Rejoignez l'aventure</h2>
  <form id="applyForm">
    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" id="name" required placeholder="Jean Dupont">
    </div>
    <div class="form-group">
      <label>Email professionnel</label>
      <input type="email" id="email" required placeholder="jean@exemple.com">
    </div>
    <div class="form-group">
      <label>Département &amp; Poste</label>
      <select id="department" required>
        <option value="Tech">Développement Tech</option>
        <option value="Design">Design UX/UI</option>
        <option value="Marketing">Marketing Digital</option>
        <option value="RH">Ressources Humaines</option>
        <option value="Finance">Finance &amp; Comptabilité</option>
        <option value="Support">Support Client</option>
        <option value="Management">Direction &amp; Management</option>
      </select>
    </div>
    <div class="form-group">
      <label>Résumé de votre expérience (CV)</label>
      <textarea id="resume" required placeholder="Décrivez vos compétences clés pour l'analyse IA..."></textarea>
    </div>
    <button type="submit" id="submitBtn">Soumettre ma candidature</button>
  </form>
  <div id="message" class="message"></div>
  <p id="publicLinkHint" style="margin-top:20px;padding:12px;border-radius:12px;font-size:12px;text-align:center;display:none;background:rgba(255,180,0,0.12);border:1px solid rgba(255,180,0,0.35);color:#ffb84d;">
    Ce lien n’est pas accessible à tout le monde. Configure <code style="color:#fff;">PUBLIC_BASE_URL</code> dans <code style="color:#fff;">.env</code> (ex. URL ngrok) puis redémarre le serveur.
  </p>
  <p style="margin-top:24px;font-size:12px;color:#888;text-align:center;line-height:1.6;">
    <strong style="color:#ccc;">Lien cliquable (ouvre ce formulaire)</strong><br />
    <a id="shareFormLink" href="/form" style="display:inline-block;margin-top:8px;padding:10px 16px;background:rgba(204,255,0,0.15);color:var(--lime);border-radius:10px;font-weight:700;text-decoration:none;word-break:break-all;border:1px solid rgba(204,255,0,0.35);">Chargement…</a>
  </p>
</div>
<script>
  (async function () {
    var shareA = document.getElementById('shareFormLink');
    var hint = document.getElementById('publicLinkHint');
    var fallback = window.location.origin + '/form';
    try {
      var r = await fetch(window.location.origin + '/api/client-config');
      var j = await r.json();
      if (j && j.recruitmentFormUrl) {
        shareA.href = j.recruitmentFormUrl;
        shareA.textContent = j.recruitmentFormUrl;
        if (hint && j.linkedInFormIsPublic === false) hint.style.display = 'block';
        return;
      }
    } catch (e) {}
    shareA.href = fallback;
    shareA.textContent = fallback;
    if (hint && /localhost|127\.0\.0\.1/i.test(fallback)) hint.style.display = 'block';
  })();
  const API_URL = window.location.origin + '/api/hera/candidate/apply';
  const form = document.getElementById('applyForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi de votre candidature...';
    messageDiv.style.display = 'none';

    const data = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      job_offer_id: '69cd9fe85b00730fb4ccb466',
      resume_text: document.getElementById('resume').value,
      department: document.getElementById('department').value
    };

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await response.json();
      if (result.success) {
        showMessage('success', 'Merci ' + data.name + ', votre candidature a bien été transmise à notre équipe RH. Vous recevrez un email prochainement.');
        form.reset();
      } else {
        showMessage('error', 'Une erreur est survenue lors de l\'envoi.');
      }
    } catch (error) {
      showMessage('error', 'Connexion au serveur impossible.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Soumettre ma candidature';
    }
  });

  function showMessage(type, text) {
    messageDiv.className = `message ${type}`;
    messageDiv.textContent = text;
    messageDiv.style.display = 'block';
  }
</script>
</body>
</html>
